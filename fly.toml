# Fly.io config for the Hono backend.
# One persistent machine (scale-to-zero when idle) => one stable DB pool.
app = "rafa-resumos-server"
primary_region = "gru" # São Paulo — closest to users and to Supabase (sa-east-1)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
